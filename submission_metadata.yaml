# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Interpretable, role-gated multiplicative ranker. The candidate's job TITLE
  gates the whole score (off-target titles capped near zero), which neutralizes
  the 2,774 keyword-stuffers a dense-cosine ranker would surface. Five structural
  components (skill-trust, career-narrative evidence, YOE, stability, location/
  education) form StructuralFit; a low-weight (0.20) gated TF-IDF semantic score
  over career narratives surfaces plain-language adjacent fits without rescuing
  stuffers. A bounded behavioral multiplier down-weights stale/unresponsive
  candidates, and a deterministic 8-rule honeypot filter zeroes impossible
  profiles (top-100 honeypot rate 0%). Reasoning is generated from extracted
  facts only (zero hallucination), varied per candidate, with honest concerns
  and rank-scaled tone. Runtime ~19s for 100K on CPU, no network.

